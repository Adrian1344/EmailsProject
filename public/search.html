<!DOCTYPE html>
<html class="light" lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <title>Resultados - School Email Lookup</title>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#a0c9ff",
              "on-primary-container": "#521800",
              "secondary-fixed-dim": "#a8c8fc",
              "outline-variant": "#e4beb1",
              "surface-container-highest": "#fadcd2",
              secondary: "#405f8d",
              primary: "#a73a00",
              "on-tertiary-fixed": "#001c37",
              "surface-container-low": "#fff1ec",
              "primary-fixed-dim": "#ffb59a",
              "surface-variant": "#fadcd2",
              "on-secondary-fixed-variant": "#264774",
              "on-primary-fixed": "#370e00",
              "error-container": "#ffdad6",
              "on-primary": "#ffffff",
              "secondary-container": "#abcbff",
              "primary-fixed": "#ffdbce",
              "on-surface": "#271812",
              outline: "#8f7065",
              "inverse-primary": "#ffb59a",
              tertiary: "#0061a6",
              "tertiary-fixed": "#d2e4ff",
              surface: "#fff8f6",
              "surface-container-high": "#ffe2d8",
              "secondary-fixed": "#d5e3ff",
              "on-secondary": "#ffffff",
              "inverse-surface": "#3e2c26",
              "on-primary-fixed-variant": "#802a00",
              "on-background": "#271812",
              "surface-container": "#ffe9e2",
              "surface-container-lowest": "#ffffff",
              "on-secondary-container": "#355582",
              "on-tertiary-container": "#002d51",
              "on-error": "#ffffff",
              "inverse-on-surface": "#ffede7",
              "surface-dim": "#f1d4ca",
              "surface-tint": "#a73a00",
              background: "#fff8f6",
              "surface-bright": "#fff8f6",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#0096fd",
              "on-tertiary-fixed-variant": "#00497f",
              "primary-container": "#ff5c00",
              error: "#ba1a1a",
              "on-secondary-fixed": "#001c3b",
              "on-surface-variant": "#5b4137",
              "on-error-container": "#93000a",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              gutter: "16px",
              md: "16px",
              "container-margin": "20px",
              base: "4px",
              lg: "24px",
              sm: "8px",
              xl: "32px",
            },
            fontFamily: {
              "body-sm": ["Inter"],
              button: ["Inter"],
              "label-caps": ["Inter"],
              "body-lg": ["Inter"],
              h1: ["Inter"],
              h2: ["Inter"],
            },
            fontSize: {
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              button: ["16px", { lineHeight: "20px", fontWeight: "600" }],
              "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              h1: ["24px", { lineHeight: "32px", letterSpacing: "-0.02em", fontWeight: "700" }],
              h2: ["20px", { lineHeight: "28px", letterSpacing: "-0.01em", fontWeight: "600" }],
            },
          },
        },
      };
    </script>
    <style>
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      body {
        background-color: #f5f7f9;
      }
      body {
        min-height: max(884px, 100dvh);
      }
      @keyframes pulse-skeleton {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .animate-pulse-skeleton {
        animation: pulse-skeleton 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .copy-feedback {
        color: #39d542;
      }
    </style>
  </head>
  <body class="font-body-lg text-on-background">
    <!-- TopAppBar -->
    <header class="flex items-center justify-between px-5 h-16 w-full fixed top-0 z-50 bg-slate-900 dark:bg-slate-950 border-b border-slate-800 shadow-sm">
      <div class="flex items-center gap-4">
        <a href="/" class="text-white hover:bg-slate-800 transition-colors p-2 rounded-lg">
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-white font-bold text-xl tracking-tight font-['Inter']">School Email Lookup</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center border border-slate-600">
          <span class="text-white font-bold">👤</span>
        </div>
      </div>
    </header>

    <main class="pt-24 pb-32 px-container-margin max-w-2xl mx-auto">
      <!-- Loading State -->
      <div id="loadingState" class="mb-lg flex flex-col items-center justify-center space-y-md">
        <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
          <span class="material-symbols-outlined text-on-secondary-container animate-spin text-[32px]">progress_activity</span>
        </div>
        <p class="font-h2 text-h2 text-on-secondary-container">Buscando informações...</p>
      </div>

      <!-- Error State (Hidden by default) -->
      <div id="errorState" class="hidden mb-lg flex flex-col items-center justify-center space-y-md">
        <div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center">
          <span class="material-symbols-outlined text-error text-[40px]">error</span>
        </div>
        <div class="text-center">
          <p class="font-h2 text-h2 text-on-surface mb-xs">Nenhum aluno encontrado</p>
          <p class="font-body-sm text-on-surface-variant mb-lg">Não encontramos nenhum aluno com esse nome ou e-mail. Tente novamente com outro termo.</p>
          <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-container text-white rounded-lg font-button text-button hover:bg-primary transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
            Voltar à Busca
          </a>
        </div>
      </div>

      <!-- Results Container (Hidden by default) -->
      <div id="resultsContainer" class="hidden space-y-lg">
        <!-- Search Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-surface-container p-lg rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30">
          <div>
            <span class="font-label-caps text-label-caps text-on-surface-variant block mb-1">RESULTADOS DA BUSCA</span>
            <h2 class="font-h1 text-h1 text-on-surface" id="searchTitle"></h2>
            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1" id="searchCount"></p>
          </div>
          <a href="/" class="inline-flex items-center gap-2 px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-button text-button hover:bg-slate-300 transition-colors">
            <span class="material-symbols-outlined">search</span>
            Nova Busca
          </a>
        </div>

        <!-- Results List -->
        <div id="resultsList" class="space-y-4"></div>
      </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] md:hidden">
      <a class="flex flex-col items-center justify-center text-[#FF5C00] font-bold active:scale-95 transition-transform duration-150" href="#">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
        <span class="font-['Inter'] text-[12px] font-medium">Search</span>
      </a>
    </nav>

    <script>
      const params = new URLSearchParams(window.location.search);
      const query = params.get('q');

      async function performSearch(searchQuery) {
        try {
          // Mostrar loading
          document.getElementById('loadingState').classList.remove('hidden');
          document.getElementById('errorState').classList.add('hidden');
          document.getElementById('resultsContainer').classList.add('hidden');

          const response = await fetch(`/api/search?query=${encodeURIComponent(searchQuery)}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Erro na busca');
          }

          // Esconder loading
          document.getElementById('loadingState').classList.add('hidden');

          if (data.results.length === 0) {
            // Mostrar not found
            document.getElementById('errorState').classList.remove('hidden');
          } else {
            // Mostrar resultados
            displayResults(data);
          }
        } catch (error) {
          console.error('Search error:', error);
          document.getElementById('loadingState').classList.add('hidden');
          document.getElementById('errorState').classList.remove('hidden');
        }
      }

      function displayResults(data) {
        const container = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');

        // Limpar resultados anteriores
        resultsList.innerHTML = '';

        // Atualizar header
        document.getElementById('searchTitle').textContent = `"${data.query}"`;
        document.getElementById('searchCount').textContent = `Encontrado${data.results.length !== 1 ? 's' : ''} ${data.results.length} aluno${data.results.length !== 1 ? 's' : ''}`;

        // Adicionar resultados
        data.results.forEach((aluno, index) => {
          const card = createResultCard(aluno, index);
          resultsList.appendChild(card);
        });

        container.classList.remove('hidden');
      }

      function createResultCard(aluno, index) {
        const article = document.createElement('article');
        article.className = 'bg-white rounded-xl p-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-transparent hover:border-primary-container transition-all group';

        const initials = aluno.nome
          .split(' ')
          .slice(0, 2)
          .map((word) => word[0].toUpperCase())
          .join('');

        const colors = ['bg-primary/10 text-primary', 'bg-secondary/10 text-secondary', 'bg-tertiary/10 text-tertiary'];
        const colorClass = colors[index % colors.length];

        article.innerHTML = `
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-gutter">
            <div class="flex items-center gap-md">
              <div class="w-12 h-12 rounded-full ${colorClass} flex items-center justify-center font-bold text-h2 shrink-0">
                ${initials}
              </div>
              <div>
                <h3 class="font-h2 text-h2 text-on-surface group-hover:text-primary transition-colors">${escapeHtml(aluno.nome)}</h3>
              </div>
            </div>
            <div class="flex flex-col md:items-end gap-2">
              <div class="flex items-center gap-2">
                <span class="font-mono text-primary font-bold text-body-lg">${escapeHtml(aluno.email)}</span>
              </div>
              <div class="flex items-center justify-between md:justify-end gap-4">
                <span class="copy-feedback font-label-caps text-label-caps hidden" data-feedback-${index}>
                  <span class="material-symbols-outlined text-sm align-middle mr-1">check_circle</span>
                  Copiado!
                </span>
                <button class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-primary-container text-on-primary hover:opacity-90 active:scale-95 transition-all rounded-lg font-button text-button w-full md:w-auto copy-btn" data-email="${escapeHtml(aluno.email)}" data-index="${index}">
                  <span class="material-symbols-outlined">content_copy</span>
                  Copiar E-mail
                </button>
              </div>
            </div>
          </div>
        `;

        // Adicionar event listener para copy
        const copyBtn = article.querySelector('.copy-btn');
        copyBtn.addEventListener('click', () => copyToClipboard(aluno.email, index));

        return article;
      }

      function copyToClipboard(email, index) {
        navigator.clipboard.writeText(email).then(() => {
          const feedback = document.querySelector(`[data-feedback-${index}]`);
          feedback.classList.remove('hidden');
          setTimeout(() => {
            feedback.classList.add('hidden');
          }, 3000);
        });
      }

      function escapeHtml(text) {
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;',
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      // Executar busca ao carregar a página
      if (query) {
        performSearch(query);
      } else {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
      }
    </script>
  </body>
</html>
